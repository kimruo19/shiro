#Data Pre-processing and Cleaning using Python
#(Without CSV - Using Inbuilt Dataset)
#Sample_ID,Chromosome,Position,Reference,Alternate,Quality
#S1,1,34567,A,G,99
#S2,1,34567,A,G,.
#S3,1,34567,A,T,85
#S4,1,?,A,G,90
#S5,1,34567,A,G,high
#S6,1,34567,A,G,92

#code
import pandas as pd
import numpy as np

# Step 1: Create dataset manually
data = {
    "Gene_ID": ["Gene1", "Gene2", "Gene3", "Gene2", "Gene4"],
    "Sample_1": [5.2, "?", 7.1, 6.5, 5.8],
    "Sample_2": [3.1, 4.2, "?", 4.8, 3.9],
    "Sample_3": [2.5, 3.6, 4.1, "?", 2.8]
}

df = pd.DataFrame(data)

print("\n--- Raw Dataset ---")
print(df)

print("\n--- Dataset Info ---")
print(df.info())

# Replace invalid symbols with NaN
df.replace("?", np.nan, inplace=True)
print("\n--- After Replacing '?' with NaN ---")
print(df)

# Convert expression columns to numeric
expression_cols = ["Sample_1", "Sample_2", "Sample_3"]

df[expression_cols] = df[expression_cols].apply(
    pd.to_numeric, errors="coerce"
)

print("\n--- After Converting to Numeric ---")
print(df)

# Handle missing values (Mean Imputation)
df[expression_cols] = df[expression_cols].fillna(
    df[expression_cols].mean()
)

print("\n--- After Filling Missing Values ---")
print(df)

# Remove duplicate genes

df_clean = df.drop_duplicates(subset="Gene_ID")

print("\n--- After Removing Duplicate Genes ---")
print(df_clean)

df_clean[expression_cols] = (
    df_clean[expression_cols] - df_clean[expression_cols].mean()
) / df_clean[expression_cols].std()

print("\n--- After Normalization ---")
print(df_clean)

var text2 = `#2:Basic DNA sequence analysis using python

# --------------------------------------------
# Step 1: Define DNA sequences
# --------------------------------------------
dna_sequences = {
    "Human": "ATGCTAGCTAGCTACGATCGATCGATCGATCG",
    "Mouse": "ATGCTAGCTAGATACGATCGATCGATCGATCA",
    "Fish":  "ATGCCAGCTAGCTACGATGGATCGATCGATCG"
}

# --------------------------------------------
# Step 2: Base composition analysis
# --------------------------------------------
def base_composition(sequence):
    return {
        "A": sequence.count("A"),
        "T": sequence.count("T"),
        "G": sequence.count("G"),
        "C": sequence.count("C")
    }

print("\n--- Base Composition ---")
for species, seq in dna_sequences.items():
    print(f"{species}: {base_composition(seq)}")

# --------------------------------------------
# Step 3: GC content calculation
# --------------------------------------------
def gc_content(sequence):
    gc = sequence.count("G") + sequence.count("C")
    return (gc / len(sequence)) * 100

print("\n--- GC Content (%) ---")
for species, seq in dna_sequences.items():
    print(f"{species}: {gc_content(seq):.2f}%")

# --------------------------------------------
# Step 4: Motif (pattern) finding
# --------------------------------------------
motif = "ATCG"

print("\n--- Motif Search ---")
for species, seq in dna_sequences.items():
    positions = []
    for i in range(len(seq) - len(motif) + 1):
        if seq[i:i+len(motif)] == motif:
            positions.append(i)
    print(f"{species}: motif found at positions {positions}")

# --------------------------------------------
# Step 5: Pairwise sequence similarity
# --------------------------------------------
def pairwise_similarity(seq1, seq2):
    matches = 0
    length = min(len(seq1), len(seq2))
    for i in range(length):
        if seq1[i] == seq2[i]:
            matches += 1
    return (matches / length) * 100

print("\n--- Pairwise Similarity (%) ---")
species = list(dna_sequences.keys())

for i in range(len(species)):
    for j in range(i+1, len(species)):
        s1, s2 = species[i], species[j]
        similarity = pairwise_similarity(
            dna_sequences[s1],
            dna_sequences[s2]
        )
        print(f"{s1} vs {s2}: {similarity:.2f}%")

#Code:
import numpy as np
from tensorflow.keras.models import Sequential
from tensorflow.keras.layers import Conv1D, MaxPooling1D, Flatten, Dense, SimpleRNN, LSTM
from tensorflow.keras.utils import to_categorical

sequences = [
    "ATGCTAGCTA",
    "ATGCTAGCTT",
    "ATGCTAGCAA",
    "GCGTACGTGC",
    "GCGTACGTGG",
    "GCGTACGTGA"
]

labels = [0,0,0,1,1,1]

encoding = {'A':0,'T':1,'G':2,'C':3}

encoded_sequences = []
for seq in sequences:
  encoded_sequences.append([encoding[n] for n in seq])

X = np.array(encoded_sequences)
y = to_categorical(labels)

X = X.reshape(X.shape[0],X.shape[1],1)

cnn = Sequential()
cnn.add(Conv1D(16,3,activation='relu',input_shape=(X.shape[1],1)))
cnn.add(MaxPooling1D(2))
cnn.add(Flatten())
cnn.add(Dense(8,activation='relu'))
cnn.add(Dense(2,activation='softmax'))

cnn.compile(optimizer='adam',loss='categorical_crossentropy',metrics=['accuracy'])
cnn.fit(X,y,epochs=20,verbose=0)
cnn_acc = cnn.evaluate(X,y,verbose=0)[1]

rnn = Sequential()
rnn.add(SimpleRNN(16,activation='relu',input_shape=(X.shape[1],1)))
rnn.add(Dense(2,activation='softmax'))

rnn.compile(optimizer='adam',loss='categorical_crossentropy',metrics=['accuracy'])
rnn.fit(X,y,epochs=25,verbose=0)
rnn_acc = rnn.evaluate(X,y,verbose=0)[1]

lstm = Sequential()
lstm.add(LSTM(16,activation='relu',input_shape=(X.shape[1],1)))
lstm.add(Dense(2,activation='softmax'))

lstm.compile(optimizer='adam',loss='categorical_crossentropy',metrics=['accuracy'])
lstm.fit(X,y,epochs=30,verbose=0)
lstm_acc = lstm.evaluate(X,y,verbose=0)[1]

print("\nModel Accuracy Comparison")
print("----------------------------")
print(f"CNN Accuracy: {cnn_acc:.2f}")
print(f"RNN Accuracy: {rnn_acc:.2f}")
print(f"LSTM Accuracy: {lstm_acc:.2f}")

encoded_new = encoded_new.reshape(1,encoded_new.shape[0],1)

#Code:
import numpy as np
from scipy.integrate import odeint
import matplotlib.pyplot as plt

def gene_expression(P, t, k_synthesis, k_degradation):
  dPdt = k_synthesis - k_degradation * P
  return dPdt

P0 = 0
k_synthesis = 5
k_degradation = 0.5

t = np.linspace(0, 20, 100)

P = odeint(
    gene_expression,
    P0,
    t,
    args=(k_synthesis, k_degradation)
)

plt.figure()
plt.plot(t, P, label='Gene Expression')
plt.xlabel('Time')
plt.ylabel('Protein Concentration')
plt.title("Gene Expression Dynamics")
plt.show()

var text7 = `# 7:Text Mining of Biological Text Data Using Python

#Code:
import nltk
from nltk.corpus import stopwords
from nltk.tokenize import word_tokenize
from collections import Counter
import matplotlib.pyplot as plt
from wordcloud import WordCloud

resources =['punkt', 'punkt_tab', 'stopwords']
for r in resources:
  try:
    nltk.data.find(r)
  except LookupError:
    nltk.download(r)

text = """
DNA sequencing is a technique used to determine the precise order of nucleotides within a DNA molecule. It plays a crucial role in bioinformatics and genomics. Bioinformatics helps in analysis of biological data using computational tools."""

tokens = word_tokenize(text.lower())
stop_words = set(stopwords.words('english'))
filtered_tokens = [word for word in tokens if word.isalpha() and word not in stop_words]

word_freq = Counter(filtered_tokens)

print("Filtered words:")
print(filtered_tokens)

print("Word Frequencies: ")
for word, freq in word_freq.items():
  print(f"{word}: {freq}")

plt.figure()
plt.bar(word_freq.keys(),word_freq.values())
plt.xlabel("Words")
plt.ylabel("Frequency")
plt.title("Word Frequency analysis of biological text")
plt.show()

wordcloud = WordCloud(width=800,height=400,background_color='white').generate_from_frequencies(word_freq)

plt.figure(figsize=(10,5))
plt.imshow(wordcloud)
plt.axis('off')
plt.show()

var text8 = `# 8:Literature Analysis of Biomedical Research Abstracts with Gene and Disease Tagging using Python

#Code:
import nltk
import re
from nltk.corpus import stopwords
from nltk.tokenize import word_tokenize
import matplotlib.pyplot as plt
from sklearn.feature_extraction.text import TfidfVectorizer

resources = ['punkt', 'punkt_tab', 'stopwords']
for r in resources:
  try:
    nltk.data.find(r)
  except LookupError:
    nltk.download(r)

literature_text = """
Breast cancer is one of the leading causes of cancer-related mortality worldwide.
Mutations in the BRCA1 and BRCA2 genes significantly increase the risk of hereditary
breast cancer. TP53 mutations are also frequently observed in cancer patients.
Early genetic screening and personalized treatment strategies improve pateint outcomes.
Bioinformatics tools play a crucial role in analyzing genomic data.
"""

gene_pattern = r'\b[A-Z]{2,}[0-9]*\b'

disease_list = [
    'breast cancer',
    'cancer',
    'hereditary cancer'
]

genes_found = re.findall(gene_pattern,literature_text)

disease_found = []
for disease in disease_list:
  if disease in literature_text.lower():
    disease_found.append(disease)

print("Tagged genes:")
print(set(genes_found))

print("\nTagged Diseases:")
print(set(disease_found))

clean_text = literature_text.lower()

stop_words = stopwords.words('english')

vectorizer = TfidfVectorizer(stop_words=stop_words)
tfidf_matrix = vectorizer.fit_transform([clean_text])

terms = vectorizer.get_feature_names_out()
scores = tfidf_matrix.toarray()[0]

tfidf_scores = dict(zip(terms,scores))

sorted_terms = sorted(tfidf_scores.items(),key=lambda x:x[1],reverse=True)

print("\n Top 10 important terms:")
for term,score in sorted_terms[:10]:
  print(f"{term}: {round(score,4)}")

plt.figure()
plt.bar(terms, scores)
plt.xlabel("Important Biological Terms")
plt.ylabel("TF-IDF Scores")
plt.title("Key Concepts in Biomedical Literature")
plt.xticks(rotation=45)
plt.show()

#DNA Data Bank of Japan (DDBJ)
#Code:
import pandas as pd
import matplotlib.pyplot as plt

sequences = {
    "DDBJ_Seq1": "ATGCGTACGTTAGCTAGCTAGCTAGCTAGCTA",
    "DDBJ_Seq2": "ATGGGCCCTTTAAACCCGGGTTTAAACCC",
    "DDBJ_Seq3": "ATGCGCGCGCGCGCTATATATATATATATA",
    "DDBJ_Seq4": "ATGAAATTTGGGCCCAAATTTGGGCCC"
}

def gc_content(sequence):
  g = sequence.count('G')
  c = sequence.count('C')
  return ((g+c)/len(sequence))*100

data =[]
for seq_id, seq in sequences.items():
  data.append({
      "Sequence_ID": seq_id,
      "Sequence Length": len(seq),
      "GC Content (%)": round(gc_content(seq),2)
  })

df = pd.DataFrame(data)
print("DDBJ-derived Sequence Statistics:")
print(df)

plt.figure()
plt.bar(df["Sequence_ID"], df["Sequence Length"])
plt.xlabel("DDBJ Sequence ID")
plt.ylabel("Sequence Length (bp)")
plt.title("Sequence Length Distribution (DDBJ-derived)")

plt.figure()
plt.bar(df["Sequence_ID"], df["GC Content (%)"])
plt.xlabel("DDBJ Sequence ID")
plt.ylabel("GC Content (%)")
plt.title("GC Content Distribution (DDBJ-derived)")
