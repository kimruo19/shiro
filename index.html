# Deep Neural Network for Binary Classification (No CSV required)

from sklearn.datasets import load_diabetes

from keras.layers import Dense

# Load dataset directly

Y = data.target

# Convert regression target into binary (0 or 1)

print("Labels:\n", Y)

# Normalize data (important for neural networks)

X = scaler.fit_transform(X)

# Create model

model.add(Dense(12, input_dim=X.shape[1], activation='relu'))
model.add(Dense(8, activation='relu'))
model.add(Dense(1, activation='sigmoid'))

# Compile model

# Train model
model.fit(X, Y, epochs=50, batch_size=10)

# Evaluate model

# Predictions

#Code:
import math
# Inputs
x1 = 0.6
x2 = 0.4
# Weights
w1 = 0.8
w2 = - 0.5
# Bias
b = 0.2
# Net input calculation
yin = x1 * w1 + x2 * w2 + b
# Binary Sigmoid Activation
def binary_sigmoid(net):
    return 1 / (1 + math.exp(-net))
# Bipolar Sigmoid Activation
def bipolar_sigmoid(net):
return (2 / (1 + math.exp(-net))) - 1
# Outputs

output_bipolar = bipolar_sigmoid(yin)
# Display results

print("Output using Bipolar Sigmoid =", output_bipolar)

var text15 = `# 9-A :Hebb network to implement logical AND function

#Code:
import numpy as np

# Training data for AND gate (bipolar form)
X = np.array([[-1, -1],[-1,  1],[ 1, -1],[ 1,  1]])

# Target outputs
Y = np.array([-1, -1, -1, 1])

# Initialize weights and bias
weights = np.zeros(2)
bias = 0

# Hebbian Learning Rule
for i in range(len(X)):
    weights = weights + X[i] * Y[i]
    bias = bias + Y[i]

print("Final Weights:", weights)
print("Final Bias:", bias)

# Testing Phase
def activation(net):
    return 1 if net >= 0 else -1

# Test all inputs
for i in range(len(X)):
    net = np.dot(weights, X[i]) + bias
    output = activation(net)
    print("Input:", X[i], "Output:", output)

var text16 = `#9-B : Delta rule network to implement logical OR function with bipolar inputs and targets.

#Code:
import numpy as np
# Bipolar OR gate dataset
X = np.array([
[-1, -1],
[-1, 1],
[1, -1],
[1, 1]
])
T = np.array([-1, 1, 1, 1]) # Target outputs
# Initialize weights and bias
weights = np.zeros(2)
bias = 0
learning_rate = 0.1
epochs = 10
# Training using Delta Rule
for epoch in range(epochs):
for i in range(len(X)):
    net = np.dot (X[i], weights) + bias
    error = T[i] - net
    # Update weights and bias
    weights = weights + learning_rate * error * X[i]
    bias = bias + learning_rate * error
print("Final Weights:", weights)
print("Final Bias:", bias)
# Testing Phase (Using Sign Activation)
def activation(net):
return 1 if net >= 0 else -1
print("\nTesting OR Gate using Delta Rule Network")
for i in range(len(X)):
net = np.dot(X[i], weights) + bias
output = activation(net)
print(f"Input: {X[i]} Output: {output}")

var text17 = `#10-A:Gradient Descent Optimization

#Implementation of Gradient Descent Optimization.
#Code:
import numpy as np

# OR Gate Dataset
X = np.array([[0,0],
[0,1],
[1,0],
[1,1]])

T = np.array([0,1,1,1])

# Initialize weights and bias
np.random.seed(0)
w = np.random.randn(2)
b = np.random.randn()

learning_rate = 0.5
epochs = 1000

# Sigmoid function
def sigmoid(x):
    return 1/(1 + np.exp(-x))

# Training using Gradient Descent
for epoch in range(epochs):
    total_error = 0

    for i in range(len(X)):

        # Forward pass
        yin = np.dot(X[i], w) + b
        y = sigmoid(yin)

        # Error
        error = T[i] - y
        total_error += 0.5 * error**2

        # Gradient (delta)
        delta = error * y * (1 - y)

        # Update weights and bias
        w = w + learning_rate * delta * X[i]
        b = b + learning_rate * delta

# Testing
print("Trained Weights:", w)
print("Trained Bias:", b)

print("\nTesting OR Gate:")
for i in range(len(X)):
    y = sigmoid(np.dot(X[i], w) + b)
    print(X[i], "->", round(y))


`;
